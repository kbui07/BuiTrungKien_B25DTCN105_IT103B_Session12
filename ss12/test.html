<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let products = [
            { id: "P01", name: "Laptop MacBook Pro M3", price: 2000, category: "Laptop", inStock: true },
            { id: "P02", name: "Chuot không day Logitech", price: 45, category: "Phụ kien", inStock: true },
            { id: "P03", name: "Ban phm Cơ Keychron", price: 95, category: "Phụ kiện", inStock: false },
            { id: "P04", name: "Man hinh Dell UltraSharp", price: 450, category: "Màn hinh", inStock: true },
            { id: "P05", name: "Tai nghe Sony WH-1000XM5", price: 350, category: "Phụ kiện", inStock: true }
        ];

    function sortProduct() {
        let list = products.filter(p => p.inStock === true);            
        let sortedList = list.sort((x, y) => x.price - y.price);
        console.log(sortedList);
    }

    function dispalyProduct() {
        let acc = products.filter(s => s.category === "Phụ kiện").map((s) => `${s.name}`);
        console.log(acc);
    }

    function totalValue() {
        let list = products.filter(p => p.inStock === true);
        let total = list.reduce((total,p) => total + p.price,0)
        console.log(total);
    }

    sortProduct();
    dispalyProduct();
    totalValue();
    </script>
</body>
</html>
